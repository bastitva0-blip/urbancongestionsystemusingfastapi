name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src tests ml_pipeline

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_secret
          POSTGRES_DB: test_congestion
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model (needed for load tests, optional for unit tests)
        run: python -m ml_pipeline.train
        continue-on-error: true

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_secret@localhost:5433/test_congestion
        run: alembic upgrade head
        continue-on-error: true  # PostGIS may not have all extensions in CI

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_secret@localhost:5433/test_congestion
          API_KEY_HASH: ""
          MODEL_PATH: ./ml_pipeline/models/congestion_model.pkl
          ENV: test
        run: pytest --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t congestion-api:ci .

      - name: Smoke test container starts
        run: |
          docker run -d --name smoke \
            -e DATABASE_URL="postgresql+asyncpg://x:x@localhost:5432/x" \
            -e API_KEY_HASH="" \
            -e MODEL_PATH="/nonexistent" \
            -e ENV="production" \
            -p 8001:8000 congestion-api:ci
          sleep 5
          # Should boot (model missing → 503 on /predict, but /health still up)
          curl -sf http://localhost:8001/health || (docker logs smoke && exit 1)
          docker stop smoke
